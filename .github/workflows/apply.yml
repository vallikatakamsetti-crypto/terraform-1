name: Terraform
on:
    push:
        branches:
        -   main

permissions:
     id-token: write   # REQUIRED for OIDC
     contents: read

jobs:
   terraform-plan:
        uses: vallikatakamsetti-crypto/terraform-reusable/.github/workflows/terraform-reusable.yml@main
        with:
            terraform-command: plan
            aws-region: us-east-1
        secrets:
            role-to-assume: ${{ secrets.S3_GIT_ROLE }}